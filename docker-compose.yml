services:
  postgres:
    image: postgres:16-alpine
    container_name: autoclip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: autoclip
      POSTGRES_PASSWORD: autoclip
      POSTGRES_DB: autoclip
    ports:
      - "5432:5432"
    volumes:
      - autoclip-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoclip -d autoclip"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  autoclip-postgres:
